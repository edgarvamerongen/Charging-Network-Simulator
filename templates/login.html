<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <title>Sign in · NRG2FLY Charging Network Simulator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #152455;
            --blue: #2563eb;
            --orange: #F0892B;
            --ink: #0f1729;
            --muted: #64748b;
            --line: #e2e8f0;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            color: var(--ink);
            background: radial-gradient(1200px 600px at 50% -10%, #1e3a8a 0%, var(--navy) 55%, #0b1437 100%);
        }
        .card {
            width: 100%;
            max-width: 380px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 24px 60px rgba(8, 15, 40, 0.45);
            padding: 36px 32px 30px;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 22px;
        }
        .brand .mark {
            width: 38px; height: 38px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--blue), var(--orange));
            display: grid; place-items: center;
            color: #fff; font-weight: 800; font-size: 18px;
        }
        .brand .name { font-weight: 800; letter-spacing: .02em; color: var(--navy); font-size: 16px; }
        .brand .name small { display: block; font-weight: 500; color: var(--muted); font-size: 11px; letter-spacing: 0; }
        h1 { font-size: 19px; margin: 4px 0 4px; }
        p.sub { margin: 0 0 22px; color: var(--muted); font-size: 13.5px; line-height: 1.5; }
        label { display: block; font-size: 12.5px; font-weight: 600; color: #334155; margin-bottom: 6px; }
        input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            font-size: 15px;
            border: 1.5px solid var(--line);
            border-radius: 10px;
            outline: none;
            transition: border-color .15s, box-shadow .15s;
            font-family: inherit;
        }
        input[type="password"]:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }
        button {
            margin-top: 18px;
            width: 100%;
            padding: 12px 16px;
            font-size: 15px;
            font-weight: 700;
            color: #fff;
            background: var(--navy);
            border: 0;
            border-radius: 10px;
            cursor: pointer;
            transition: background .15s, transform .05s;
            font-family: inherit;
        }
        button:hover { background: #1d3270; }
        button:active { transform: translateY(1px); }
        .error {
            margin: 0 0 16px;
            padding: 10px 12px;
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #b91c1c;
            border-radius: 9px;
            font-size: 13px;
        }
        .foot { margin-top: 22px; text-align: center; color: var(--muted); font-size: 11.5px; }
    </style>
</head>
<body>
    <main class="card">
        <div class="brand">
            <div class="mark">N2</div>
            <div class="name">NRG2FLY<small>Charging Network Simulator</small></div>
        </div>
        <h1>Sign in</h1>
        <p class="sub">This tool is private. Enter the access password to continue.</p>

        {% if error %}<div class="error" role="alert">{{ error }}</div>{% endif %}

        <form method="post" action="{{ url_for('login') }}" autocomplete="off">
            <input type="hidden" name="next" value="{{ next }}">
            <label for="password">Password</label>
            <input type="password" id="password" name="password"
                   autocomplete="current-password" autofocus required>
            <button type="submit">Enter</button>
        </form>

        <div class="foot">NRG2FLY · Electric aviation charging</div>
    </main>
</body>
</html>
