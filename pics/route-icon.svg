<svg viewBox="0 13 200 200" width="200" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Yellow (bottom-left) -> orange (top-right). Edit these stops to recolor. -->
    <linearGradient id="routeGrad" gradientUnits="userSpaceOnUse"
                    x1="34" y1="186" x2="166" y2="33">
      <stop offset="0"   stop-color="#FFB800"/>
      <stop offset="0.5" stop-color="#FF9A00"/>
      <stop offset="1"   stop-color="#FF7A00"/>
    </linearGradient>
  </defs>

  <g fill="none" stroke="url(#routeGrad)" stroke-width="17"
     stroke-linecap="round" stroke-linejoin="round">

    <!-- Winding route connecting the two pin tips -->
    <path d="M60,152 C60,181 106,183 112,154 C118,132 140,140 140,116"/>

    <!-- Bottom-left pin (hollow teardrop) -->
    <path d="M60,78 C45.63,78 34,89.63 34,104 C34,123.5 60,152.3 60,152.3
             C60,152.3 86,123.5 86,104 C86,89.63 74.37,78 60,78 Z"/>

    <!-- Top-right pin (hollow teardrop) -->
    <path d="M140,42 C125.63,42 114,53.63 114,68 C114,87.5 140,116.3 140,116.3
             C140,116.3 166,87.5 166,68 C166,53.63 154.37,42 140,42 Z"/>
  </g>
</svg>
